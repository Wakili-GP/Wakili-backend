version: '3.8'

services:
  wakiliy.api:
    image: wakiliy.api
    build:
      context: .
      dockerfile: Wakiliy.API/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - .env
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
